<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — Phone Switch Hub</title>
  <meta name="description" content="Phone Switch Hub에 로그인하거나 회원가입하세요.">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      alert("JS Error: " + message + "\nLine: " + lineno + "\nFile: " + source);
      return false;
    };
  </script>
</head>
<body>

<div class="app-shell" style="padding-bottom:20px;">
  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon">💎</div>
      <span class="nav-logo-text" data-i18n="app_title">PHONE SWITCH HUB</span>
    </a>
    <div class="nav-links">
      <select id="langSelect" class="lang-select" onchange="changeLanguage(this.value)">
        <option value="th">🇹🇭 TH</option>
        <option value="mm">🇲🇲 MM</option>
        <option value="ko">🇰🇷 KO</option>
      </select>
    </div>
  </nav>

  <div class="auth-wrap" style="min-height:calc(100vh - 88px); display:flex; align-items:center; justify-content:center; padding:16px;">
    <div class="auth-card" style="margin:0; width:100%; border:none; background:transparent; box-shadow:none; padding:16px;">
      <!-- Logo -->
      <div class="auth-logo">
        <div class="icon">💎</div>
        <h1 data-i18n="app_title">IRIS MOBILE</h1>
        <p data-i18n="hero_badge">전화번호로 간편하게 시작하세요 🇹🇭</p>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="tab-btn active" id="tabA" onclick="switchForm('login')" data-i18n="login">🔑 로그인</button>
        <button class="tab-btn" id="tabB" onclick="switchForm('reg')" data-i18n="tab_mypage">📝 회원가입</button>
      </div>

      <!-- ===== LOGIN ===== -->
      <div id="loginForm">
        <div class="form-group">
          <label class="form-label" data-i18n="product_location">전화번호 / เบอร์โทร</label>
          <div class="phone-row">
            <div class="cc">🇹🇭 +66</div>
            <input type="tel" class="form-input" id="lPhone" placeholder="812345678" maxlength="10" inputmode="numeric">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">PIN 번호 (4자리) / PIN</label>
          <div class="pin-row">
            <input type="password" class="pin-box" id="l1" maxlength="1" inputmode="numeric">
            <input type="password" class="pin-box" id="l2" maxlength="1" inputmode="numeric">
            <input type="password" class="pin-box" id="l3" maxlength="1" inputmode="numeric">
            <input type="password" class="pin-box" id="l4" maxlength="1" inputmode="numeric">
          </div>
        </div>
        <div class="err" id="lErr" style="margin-bottom:12px;"></div>
        <button class="btn-submit" id="btnLogin" onclick="doLogin()" data-i18n="login">🔑 로그인</button>
        <p style="text-align:center;margin-top:18px;font-size:13px;color:var(--t2);">
          계정이 없으신가요? <span style="color:var(--purple-l);cursor:pointer;font-weight:700;" onclick="switchForm('reg')">회원가입</span>
        </p>
      </div>

      <!-- ===== REGISTER ===== -->
      <div id="regForm" style="display:none;">
        <div class="form-group">
          <label class="form-label">이름 / ชื่อ</label>
          <input type="text" class="form-input" id="rName" placeholder="홍길동 / สมชาย">
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="product_location">전화번호 / เบอร์โทร</label>
          <div class="phone-row">
            <div class="cc">🇹🇭 +66</div>
            <input type="tel" class="form-input" id="rPhone" placeholder="812345678" maxlength="10" inputmode="numeric">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">역할 선택 / เลือกบทบาท</label>
          <div class="role-grid">
            <div class="role-opt sel" id="rBuyer" onclick="pickRole('buyer')">
              <div class="role-icon">🛍️</div>
              <div class="role-name">구매자</div>
              <div class="role-hint">물건을 구매합니다</div>
            </div>
            <div class="role-opt" id="rSeller" onclick="pickRole('seller')">
              <div class="role-icon">💼</div>
              <div class="role-name">판매자</div>
              <div class="role-hint">물건을 판매합니다</div>
            </div>
          </div>
        </div>
        
        <div id="sellerExtra" style="display:none;">
          <div class="form-group">
            <label class="form-label">매장명 / ชื่อร้าน</label>
            <input type="text" class="form-input" id="rStore" placeholder="예: Kim Mobile Shop">
          </div>
          <div class="form-group">
            <label class="form-label">매장 소속 지역 (주) / พื้นที่ร้านค้า (จังหวัด)</label>
            <select class="form-input" id="rProvince">
              <option value="">지역(주) 선택 / 선택해주세요</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">매장 소속 구/군 (District) / อำเภอ</label>
            <select class="form-input" id="rDistrict">
              <option value="">구/군 선택 / 선택해주세요</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">매장 상세 주소 / ที่อยู่ร้านค้า</label>
            <textarea class="form-textarea" id="rAddress" placeholder="상세 주소를 기재해주세요"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">구글맵 GPS 좌표 (선택) / พิกัด Google Maps</label>
            <input type="text" class="form-input" id="rCoords" placeholder="예: 13.7563, 100.5018">
          </div>
          <div class="form-group">
            <label class="form-label">매장 로고 이미지 (선택) / โลโก้ร้านค้า</label>
            <input type="file" id="rLogo" accept="image/*" class="form-input" style="padding: 10px;">
          </div>
          <div class="form-group">
            <label class="form-label">수수료 정산 및 결제 방식 / วิธีรับเงิน</label>
            <select class="form-input" id="rPayout">
              <option value="parent_payment">플랫폼 전체 수금 후 정산 (Parent Payment)</option>
              <option value="cod_commission">캐쉬온딜리버리(COD) 직접 거래 후 수수료 송금 (COD &amp; Commission)</option>
            </select>
          </div>
        </div>
        
        <div class="form-group">
          <label class="form-label">PIN 번호 설정 (4자리) / ตั้ง PIN</label>
          <div class="pin-row">
            <input type="password" class="pin-box" id="r1" maxlength="1" inputmode="numeric">
            <input type="password" class="pin-box" id="r2" maxlength="1" inputmode="numeric">
            <input type="password" class="pin-box" id="r3" maxlength="1" inputmode="numeric">
            <input type="password" class="pin-box" id="r4" maxlength="1" inputmode="numeric">
          </div>
        </div>
        <div class="err" id="rErr" style="margin-bottom:12px;"></div>
        <div class="ok" id="rOk" style="margin-bottom:12px;"></div>
        <button class="btn-submit" id="btnReg" onclick="doRegister()">🚀 회원가입</button>
        <p style="text-align:center;margin-top:18px;font-size:13px;color:var(--t2);">
          이미 계정이 있으신가요? <span style="color:var(--purple-l);cursor:pointer;font-weight:700;" onclick="switchForm('login')">로그인</span>
        </p>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="globalToast"></div>

<script src="js/thailand-addresses.js"></script>
<script src="js/i18n.js"></script>
<script src="js/config.js"></script>
<script>
let role = 'buyer';

// Run translations immediately safely
try {
  if (window.applyTranslations) applyTranslations();
} catch (e) {
  console.error("Translation init failed:", e);
}

// Initialize Thailand address dropdowns
try {
  initThailandAddressSelects('rProvince', 'rDistrict');
} catch (e) {
  console.error("Address dropdowns init failed:", e);
}

// Already logged in check (CORS/file protocol safe)
try {
  if (typeof supabase !== 'undefined' && supabase.auth) {
    supabase.auth.getUser()
      .then(({ data }) => { if (data && data.user) redirect(); })
      .catch(err => console.warn("Supabase getUser failed:", err));
  }
} catch (e) {
  console.warn("Supabase auth check skipped:", e);
}

function switchForm(t) {
  const isLogin = t === 'login';
  document.getElementById('tabA').className = 'tab-btn' + (isLogin ? ' active' : '');
  document.getElementById('tabB').className = 'tab-btn' + (!isLogin ? ' active' : '');
  document.getElementById('loginForm').style.display = isLogin ? 'block' : 'none';
  document.getElementById('regForm').style.display = isLogin ? 'none' : 'block';
  applyTranslations();
}

function pickRole(r) {
  role = r;
  document.getElementById('rBuyer').className = 'role-opt' + (r === 'buyer' ? ' sel' : '');
  document.getElementById('rSeller').className = 'role-opt' + (r === 'seller' ? ' sel' : '');
  document.getElementById('sellerExtra').style.display = r === 'seller' ? 'block' : 'none';
}

// PIN auto-focus (모바일 가상 키보드 최적화 버전)
function setupPin(ids) {
  ids.forEach((id, i) => {
    const el = document.getElementById(id);
    if (!el) return;
    
    // 입력 이벤트 리스너 (글자 입력 시 다음 인풋 포커스)
    el.addEventListener('input', () => {
      if (el.value.length >= 1) {
        el.value = el.value.slice(0, 1); // 1글자 초과 시 잘라내기
        if (i < ids.length - 1) {
          document.getElementById(ids[i+1]).focus();
        }
      }
    });
    
    // 백스페이스 감지 리스너
    el.addEventListener('keydown', e => {
      if (e.key === 'Backspace') {
        if (!el.value && i > 0) {
          const prevEl = document.getElementById(ids[i-1]);
          prevEl.focus();
          prevEl.value = ''; // 이전 칸 지우기
        } else {
          el.value = ''; // 현재 칸 지우기
        }
      }
    });
  });
}
setupPin(['l1','l2','l3','l4']);
setupPin(['r1','r2','r3','r4']);

function getPin(ids) { return ids.map(id => document.getElementById(id).value).join(''); }

async function doLogin() {
  const phone = document.getElementById('lPhone').value.replace(/\D/g,'');
  const pin = getPin(['l1','l2','l3','l4']);
  const errEl = document.getElementById('lErr');

  if (phone.length < 8) { errEl.textContent = '전화번호를 올바르게 입력해주세요'; return; }
  if (pin.length !== 4) { errEl.textContent = 'PIN 4자리를 입력해주세요'; return; }
  errEl.textContent = '';

  setLoading('btnLogin', true, '로그인 중...');
  try {
    const { error } = await supabase.auth.signInWithPassword({
      email: phoneToEmail(phone),
      password: makePassword(pin, phone)
    });
    setLoading('btnLogin', false);
    if (error) { errEl.textContent = '전화번호 또는 PIN이 올바르지 않습니다.'; return; }
    await redirect();
  } catch (err) {
    setLoading('btnLogin', false);
    errEl.textContent = '오류 발생: ' + (err.message || err.toString());
    console.error(err);
  }
}

async function doRegister() {
  const name = document.getElementById('rName').value.trim();
  const phone = document.getElementById('rPhone').value.replace(/\D/g,'');
  const pin = getPin(['r1','r2','r3','r4']);
  const store = document.getElementById('rStore').value.trim();
  const province = document.getElementById('rProvince').value;
  const district = document.getElementById('rDistrict').value;
  const address = document.getElementById('rAddress').value.trim();
  const coords = document.getElementById('rCoords').value.trim();
  const payout = document.getElementById('rPayout').value;
  
  const errEl = document.getElementById('rErr');
  const okEl = document.getElementById('rOk');

  errEl.textContent = ''; okEl.textContent = '';
  if (!name) { errEl.textContent = '이름을 입력해주세요'; return; }
  if (phone.length < 8) { errEl.textContent = '전화번호를 올바르게 입력해주세요'; return; }
  if (pin.length !== 4) { errEl.textContent = 'PIN 4자리를 설정해주세요'; return; }
  if (role === 'seller') {
    if (!store) { errEl.textContent = '매장명을 입력해주세요'; return; }
    if (!province) { errEl.textContent = '지역(주)을 선택해주세요'; return; }
    if (!district) { errEl.textContent = '구/군(District)을 선택해주세요'; return; }
    if (!address) { errEl.textContent = '상세 주소를 입력해주세요'; return; }
  }

  setLoading('btnReg', true, '가입 중...');
  try {
    const isAdmin = !!(ADMIN_PHONE && phone === ADMIN_PHONE);
    let userId = null;

    // Check if there is already an active session matching this phone number
    const { data: { user: currentUser } } = await supabase.auth.getUser();
    if (currentUser && phoneToEmail(phone) === currentUser.email) {
      userId = currentUser.id;
    } else {
      const { data, error } = await supabase.auth.signUp({
        email: phoneToEmail(phone),
        password: makePassword(pin, phone)
      });

      if (error) {
        if (error.message.includes('already')) {
          // Check if profile actually exists in database
          const { data: existingProfile } = await supabase.from('profiles').select('id').eq('phone', phone).maybeSingle();
          if (existingProfile) {
            setLoading('btnReg', false);
            errEl.textContent = '이미 등록된 전화번호입니다. 로그인해주세요.';
            return;
          } else {
            // Profile does not exist (broken state) -> Try to login to complete registration
            const { data: signInData, error: signInError } = await supabase.auth.signInWithPassword({
              email: phoneToEmail(phone),
              password: makePassword(pin, phone)
            });
            if (signInError) {
              setLoading('btnReg', false);
              errEl.textContent = '이미 가입 진행 중인 번호입니다. 기존 PIN 번호로 로그인하시거나 다른 번호로 가입해주세요.';
              return;
            }
            userId = signInData.user.id;
          }
        } else {
          setLoading('btnReg', false);
          errEl.textContent = error.message;
          return;
        }
      } else {
        userId = data.user.id;
      }
    }

    // Logo upload for sellers
    let logoUrl = null;
    if (role === 'seller') {
      const file = document.getElementById('rLogo').files[0];
      if (file) {
        const compressedFile = await resizeAndCompressImage(file, 400, 0.8);
        const path = `avatars/${userId}_logo.jpg`;
        const { error: upErr } = await supabase.storage.from('avatars').upload(path, compressedFile, { upsert: true });
        if (!upErr) {
          const { data: urlData } = supabase.storage.from('avatars').getPublicUrl(path);
          logoUrl = urlData.publicUrl;
        }
      }
    }

    // Insert profile with extended fields for sellers
    const profileData = {
      id: userId,
      phone, name,
      role: isAdmin ? 'admin' : role,
      store_name: store || null,
      profile_image: logoUrl,
      is_approved: role === 'buyer' || isAdmin
    };

    if (role === 'seller') {
      profileData.partner_type = 'partner'; // Newly registered partner shop
      profileData.location_province = province;
      profileData.location_district = district;
      profileData.location_address = address;
      profileData.location_coords = coords || null;
      profileData.payout_method = payout;
      profileData.commission_rate = 10.00; // default 10%
      profileData.description = '검증된 협력사 매장';
    }

    const { error: pe } = await supabase.from('profiles').insert(profileData);

    setLoading('btnReg', false);
    if (pe) { errEl.textContent = '오류: ' + pe.message; return; }

    if (role === 'seller' && !isAdmin) {
      okEl.textContent = '✅ 판매자 등록 완료! 관리자 승인 후 활성화됩니다.';
      setTimeout(() => { window.location.href = 'index.html'; }, 3000);
    } else {
      await redirect();
    }
  } catch (err) {
    setLoading('btnReg', false);
    errEl.textContent = '오류 발생: ' + (err.message || err.toString());
    console.error(err);
  }
}

async function redirect() {
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) return;
  const { data: p } = await supabase.from('profiles').select('role').eq('id', user.id).single();
  if (!p) { 
    // 프로필이 없는 경우 (인증은 되었으나 프로필 생성이 실패한 비정상 세션)
    // 회원가입 페이지로 이동시키고 전화번호를 입력하여 완성을 유도합니다.
    showToast('프로필 정보가 완성되지 않았습니다. 가입 정보를 입력하여 완료해 주세요.', 'error');
    switchForm('reg');
    const rawEmail = user.email || '';
    const phoneNum = rawEmail.split('@')[0];
    if (phoneNum) {
      document.getElementById('rPhone').value = phoneNum;
    }
    return; 
  }
  if (p.role === 'admin') window.location.href = 'admin/dashboard.html';
  else if (p.role === 'seller') window.location.href = 'seller/dashboard.html';
  else window.location.href = 'index.html';
}

window.addEventListener('languageChanged', () => {
  applyTranslations();
});
</script>
</body>
</html>
