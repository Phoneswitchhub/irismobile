<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>판매자 대시보드 — Iris Mobile</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="db-wrap">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-head">
      <a href="../index.html" class="nav-logo">
        <div class="nav-logo-icon">💎</div>
        <span class="nav-logo-text">IRIS MOBILE</span>
      </a>
    </div>
    <nav class="sb-nav">
      <div class="sb-sec-lbl">메뉴 / Menu</div>
      <button class="sb-link active" onclick="showPage('overview')"><span class="ico">📊</span> 개요</button>
      <button class="sb-link" onclick="showPage('products')"><span class="ico">📱</span> 내 상품</button>
      <button class="sb-link" onclick="showPage('orders')"><span class="ico">📦</span> 주문 내역</button>
      <button class="sb-link" onclick="showPage('profile')"><span class="ico">👤</span> 프로필</button>
      <div class="sb-sec-lbl">바로가기</div>
      <a class="sb-link" href="../index.html"><span class="ico">🏠</span> 메인 홈</a>
      <a class="sb-link" href="../shop.html"><span class="ico">🛍️</span> 쇼핑몰</a>
    </nav>
    <div class="sb-foot">
      <div class="sb-user">
        <div class="sb-avatar" id="sbAvatar">💼</div>
        <div>
          <div class="sb-uname" id="sbName">로딩중…</div>
          <div class="sb-urole">판매자</div>
        </div>
      </div>
      <button class="btn-nav btn-nav-outline" style="width:100%;margin-top:12px;justify-content:center;" onclick="doLogout()">🚪 로그아웃</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- ===== OVERVIEW PAGE ===== -->
    <div id="page-overview">
      <div class="main-hd">
        <h1>📊 개요 Overview</h1>
        <span id="hd-date" style="color:var(--t2);font-size:13px;"></span>
      </div>
      <div class="main-body">
        <div class="stat-grid">
          <div class="stat-card">
            <div class="sc-icon" style="background:rgba(139,92,246,.15);">📱</div>
            <div class="sc-val" id="sc1">—</div>
            <div class="sc-lbl">등록 상품</div>
          </div>
          <div class="stat-card">
            <div class="sc-icon" style="background:rgba(251,191,36,.15);">📦</div>
            <div class="sc-val" id="sc2">—</div>
            <div class="sc-lbl">대기 주문</div>
          </div>
          <div class="stat-card">
            <div class="sc-icon" style="background:rgba(16,185,129,.15);">✅</div>
            <div class="sc-val" id="sc3">—</div>
            <div class="sc-lbl">완료 거래</div>
          </div>
          <div class="stat-card">
            <div class="sc-icon" style="background:rgba(34,211,238,.15);">💰</div>
            <div class="sc-val" id="sc4">—</div>
            <div class="sc-lbl">총 매출 (฿)</div>
          </div>
        </div>

        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
            <h3 style="font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;">최근 주문</h3>
          </div>
          <div class="tbl-wrap">
            <table class="tbl">
              <thead><tr><th>구매자</th><th>상품</th><th>금액</th><th>날짜</th><th>상태</th><th>처리</th></tr></thead>
              <tbody id="recentOrders"><tr><td colspan="6" style="text-align:center;padding:30px;color:var(--t3);">로딩 중…</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== PRODUCTS PAGE ===== -->
    <div id="page-products" style="display:none;">
      <div class="main-hd">
        <h1>📱 내 상품</h1>
        <button class="btn-nav" onclick="openAddProduct()">➕ 상품 등록</button>
      </div>
      <div class="main-body">
        <div class="products-grid" id="myProductsGrid">
          <div class="empty" style="grid-column:1/-1;"><div class="empty-ico">📱</div><div class="empty-ttl">로딩 중…</div></div>
        </div>
      </div>
    </div>

    <!-- ===== ORDERS PAGE ===== -->
    <div id="page-orders" style="display:none;">
      <div class="main-hd"><h1>📦 주문 내역</h1></div>
      <div class="main-body">
        <div class="card">
          <div class="tbl-wrap">
            <table class="tbl">
              <thead><tr><th>주문번호</th><th>구매자</th><th>상품</th><th>수량</th><th>금액</th><th>요청</th><th>날짜</th><th>상태</th><th>처리</th></tr></thead>
              <tbody id="allOrders"><tr><td colspan="9" style="text-align:center;padding:30px;color:var(--t3);">로딩 중…</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== PROFILE PAGE ===== -->
    <div id="page-profile" style="display:none;">
      <div class="main-hd"><h1>👤 프로필 설정</h1></div>
      <div class="main-body">
        <div class="card" style="max-width:540px;">
          <div style="text-align:center;margin-bottom:28px;">
            <div class="s-avatar" style="width:90px;height:90px;font-size:38px;margin:0 auto 12px;" id="profAvatarPreview">💼</div>
            <label style="cursor:pointer;">
              <span class="btn-sm btn-purple">📷 사진 변경</span>
              <input type="file" id="profImg" accept="image/*" style="display:none;" onchange="previewAvatar(this)">
            </label>
          </div>
          <div class="form-group"><label class="form-label">이름</label><input type="text" class="form-input" id="profName"></div>
          <div class="form-group"><label class="form-label">전화번호</label><input type="text" class="form-input" id="profPhone" disabled style="opacity:.6;"></div>
          <div class="form-group"><label class="form-label">매장명</label><input type="text" class="form-input" id="profStore"></div>
          <div class="form-group"><label class="form-label">매장 소개</label><textarea class="form-textarea" id="profDesc"></textarea></div>
          <button class="btn-submit" id="btnSaveProfile" onclick="saveProfile()">💾 저장하기</button>
        </div>
      </div>
    </div>

  </main>
</div>

<!-- ADD/EDIT PRODUCT MODAL -->
<div class="modal-bg" id="prodModal">
  <div class="modal" style="max-width:580px;">
    <div class="modal-hd">
      <span class="modal-title" id="prodModalTitle">📱 상품 등록</span>
      <button class="modal-x" onclick="closeProdModal()">✕</button>
    </div>
    <div style="overflow-y:auto;max-height:70vh;">
      <input type="hidden" id="editProductId">
      <div class="form-group"><label class="form-label">상품명 *</label><input type="text" class="form-input" id="pTitle" placeholder="예: iPhone 15 Pro 128GB Space Black"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div class="form-group">
          <label class="form-label">가격 (฿) *</label>
          <input type="number" class="form-input" id="pPrice" placeholder="25000">
        </div>
        <div class="form-group">
          <label class="form-label">카테고리 *</label>
          <select class="form-select" id="pCat">
            <option value="iPhone">🍎 iPhone</option>
            <option value="Samsung">🌟 Samsung</option>
            <option value="Xiaomi">🔴 Xiaomi</option>
            <option value="Other">📦 기타</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">재고 수량</label><input type="number" class="form-input" id="pStock" value="1" min="0"></div>
      <div class="form-group"><label class="form-label">상품 설명</label><textarea class="form-textarea" id="pDesc" placeholder="상품 상태, 구성품, 특이사항 등을 입력하세요"></textarea></div>
      <div class="form-group">
        <label class="form-label">상품 사진 (최대 3장)</label>
        <div class="img-upload" onclick="document.getElementById('pImgInput').click()">
          <div class="img-upload-ico">📷</div>
          <div class="img-upload-txt">클릭하여 사진 선택 <span>(JPG, PNG, max 5MB)</span></div>
        </div>
        <input type="file" id="pImgInput" accept="image/*" multiple style="display:none;" onchange="previewImages(this)">
        <div class="preview-grid" id="imgPreviews"></div>
        <div id="existingImages"></div>
      </div>
    </div>
    <div style="display:flex;gap:12px;margin-top:16px;">
      <button class="btn-submit" id="btnSaveProd" onclick="saveProduct()" style="flex:1;">💾 저장</button>
      <button class="btn-sm btn-red" onclick="closeProdModal()" style="padding:14px 20px;border-radius:var(--r);">취소</button>
    </div>
  </div>
</div>

<div class="toast" id="globalToast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script>
let myProfile = null;
let editingProduct = null;
let newImageFiles = [];

// Init
async function init() {
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) { window.location.href = '../login.html'; return; }

  const { data: p } = await supabase.from('profiles').select('*').eq('id', user.id).single();
  if (!p || (p.role !== 'seller' && p.role !== 'admin')) { window.location.href = '../index.html'; return; }
  if (p.role === 'seller' && !p.is_approved) {
    document.body.innerHTML = '<div style="text-align:center;padding:100px 20px;"><div style="font-size:56px;margin-bottom:20px;">⏳</div><h2 style="font-family:Outfit,sans-serif;font-size:28px;">승인 대기 중</h2><p style="color:var(--t2);margin-top:10px;">관리자 승인 후 대시보드를 사용할 수 있습니다.</p><a href="../index.html" style="display:inline-block;margin-top:24px;padding:12px 28px;background:var(--gp);color:#fff;border-radius:12px;font-weight:700;text-decoration:none;">홈으로</a></div>';
    return;
  }

  myProfile = p;
  document.getElementById('sbName').textContent = p.name;
  document.getElementById('hd-date').textContent = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });

  // Fill profile form
  document.getElementById('profName').value = p.name;
  document.getElementById('profPhone').value = '+66 ' + p.phone;
  document.getElementById('profStore').value = p.store_name || '';
  document.getElementById('profDesc').value = p.description || '';

  await loadStats();
  await loadRecentOrders();
  await loadMyProducts();
  await loadAllOrders();
}

async function loadStats() {
  const uid = myProfile.id;
  const [prods, pending, done, revenue] = await Promise.all([
    supabase.from('products').select('*', { count: 'exact', head: true }).eq('seller_id', uid).eq('status', 'active'),
    supabase.from('orders').select('*', { count: 'exact', head: true }).eq('seller_id', uid).eq('status', 'pending'),
    supabase.from('orders').select('*', { count: 'exact', head: true }).eq('seller_id', uid).eq('status', 'completed'),
    supabase.from('orders').select('total_price').eq('seller_id', uid).eq('status', 'completed')
  ]);
  document.getElementById('sc1').textContent = prods.count || 0;
  document.getElementById('sc2').textContent = pending.count || 0;
  document.getElementById('sc3').textContent = done.count || 0;
  const total = (revenue.data || []).reduce((s, o) => s + Number(o.total_price), 0);
  document.getElementById('sc4').textContent = total.toLocaleString();
}

async function loadRecentOrders() {
  const { data } = await supabase.from('orders')
    .select('*, products(title), profiles!orders_buyer_id_fkey(name, phone)')
    .eq('seller_id', myProfile.id).order('created_at', { ascending: false }).limit(5);
  renderOrderTable('recentOrders', data || [], true);
}

async function loadAllOrders() {
  const { data } = await supabase.from('orders')
    .select('*, products(title), profiles!orders_buyer_id_fkey(name, phone)')
    .eq('seller_id', myProfile.id).order('created_at', { ascending: false });
  renderOrderTable('allOrders', data || [], true);
}

function renderOrderTable(tbodyId, orders, showFull) {
  const tbody = document.getElementById(tbodyId);
  if (!orders.length) { tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:30px;color:var(--t3);">주문이 없습니다</td></tr>'; return; }
  tbody.innerHTML = orders.map(o => `
    <tr>
      ${showFull ? `<td style="font-size:11px;color:var(--t3);">${o.id.slice(0,8)}…</td>` : ''}
      <td><div style="font-weight:600;color:var(--t1);">${o.profiles?.name || '—'}</div><div style="font-size:11px;color:var(--t3);">${o.profiles?.phone ? '+66'+o.profiles.phone : ''}</div></td>
      <td>${o.products?.title || '—'}</td>
      ${showFull ? `<td>${o.quantity}</td>` : ''}
      <td style="color:var(--gold);font-weight:700;">฿${Number(o.total_price).toLocaleString()}</td>
      ${showFull ? `<td style="max-width:120px;font-size:12px;">${o.notes || '—'}</td>` : ''}
      <td style="font-size:12px;color:var(--t3);">${formatDate(o.created_at)}</td>
      <td><span class="badge ${statusBadge(o.status)}">${statusText(o.status)}</span></td>
      <td>
        ${o.status === 'pending' ? `<button class="btn-sm btn-green" onclick="updateOrder('${o.id}','confirmed')">확인</button>` : ''}
        ${o.status === 'confirmed' ? `<button class="btn-sm btn-purple" onclick="updateOrder('${o.id}','completed')">완료</button>` : ''}
        ${o.status === 'pending' ? `<button class="btn-sm btn-red" style="margin-left:4px;" onclick="updateOrder('${o.id}','cancelled')">취소</button>` : ''}
      </td>
    </tr>
  `).join('');
}

async function updateOrder(id, status) {
  const { error } = await supabase.from('orders').update({ status }).eq('id', id);
  if (error) { showToast('❌ 오류: ' + error.message, 'error'); return; }
  showToast('✅ 상태가 업데이트됐습니다.', 'success');
  await loadStats(); await loadRecentOrders(); await loadAllOrders();
}

async function loadMyProducts() {
  const { data } = await supabase.from('products').select('*').eq('seller_id', myProfile.id).order('created_at', { ascending: false });
  const grid = document.getElementById('myProductsGrid');
  if (!data || !data.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1;"><div class="empty-ico">📱</div><div class="empty-ttl">등록된 상품이 없습니다</div><div class="empty-txt">상품을 등록해보세요!</div></div>';
    return;
  }
  grid.innerHTML = data.map(p => `
    <div class="product-card">
      <div class="p-img">
        ${p.images?.[0] ? `<img src="${p.images[0]}" alt="${p.title}" loading="lazy">` : { iPhone:'🍎', Samsung:'🌟', Xiaomi:'🔴' }[p.category] || '📱'}
        <div class="p-badge">${p.category || 'Mobile'}</div>
        <div style="position:absolute;top:10px;right:10px;"><span class="badge ${p.status === 'active' ? 'bg-green' : 'bg-gray'}">${p.status === 'active' ? '판매중' : '숨김'}</span></div>
      </div>
      <div class="p-info">
        <div class="p-title">${p.title}</div>
        <div class="p-price">฿${Number(p.price).toLocaleString()} <small>재고: ${p.stock}개</small></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn-sm btn-purple" onclick="editProduct('${p.id}')">✏️ 수정</button>
          <button class="btn-sm ${p.status === 'active' ? 'btn-red' : 'btn-green'}" onclick="toggleStatus('${p.id}','${p.status}')">
            ${p.status === 'active' ? '🙈 숨기기' : '👁️ 공개'}
          </button>
          <button class="btn-sm btn-red" onclick="deleteProduct('${p.id}')">🗑️</button>
        </div>
      </div>
    </div>
  `).join('');
}

function openAddProduct() {
  editingProduct = null;
  newImageFiles = [];
  document.getElementById('editProductId').value = '';
  document.getElementById('prodModalTitle').textContent = '📱 상품 등록';
  document.getElementById('pTitle').value = '';
  document.getElementById('pPrice').value = '';
  document.getElementById('pCat').value = 'iPhone';
  document.getElementById('pStock').value = '1';
  document.getElementById('pDesc').value = '';
  document.getElementById('imgPreviews').innerHTML = '';
  document.getElementById('existingImages').innerHTML = '';
  document.getElementById('prodModal').classList.add('open');
}

async function editProduct(id) {
  const { data: p } = await supabase.from('products').select('*').eq('id', id).single();
  if (!p) return;
  editingProduct = p;
  newImageFiles = [];
  document.getElementById('editProductId').value = p.id;
  document.getElementById('prodModalTitle').textContent = '✏️ 상품 수정';
  document.getElementById('pTitle').value = p.title;
  document.getElementById('pPrice').value = p.price;
  document.getElementById('pCat').value = p.category || 'iPhone';
  document.getElementById('pStock').value = p.stock;
  document.getElementById('pDesc').value = p.description || '';
  document.getElementById('imgPreviews').innerHTML = '';
  document.getElementById('existingImages').innerHTML = (p.images || []).map((url, i) =>
    `<div style="position:relative;display:inline-block;margin-right:8px;margin-top:8px;">
      <img src="${url}" class="prev-img">
      <button onclick="removeExistingImg(${i})" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--red);color:#fff;border:none;cursor:pointer;font-size:12px;line-height:1;">✕</button>
     </div>`
  ).join('');
  document.getElementById('prodModal').classList.add('open');
}

let removedImages = [];
function removeExistingImg(i) {
  if (editingProduct) { removedImages.push(editingProduct.images[i]); editingProduct.images.splice(i, 1); editProduct(editingProduct.id); }
}

function previewImages(input) {
  const files = Array.from(input.files).slice(0, 3);
  newImageFiles = files;
  const prev = document.getElementById('imgPreviews');
  prev.innerHTML = '';
  files.forEach(f => {
    const reader = new FileReader();
    reader.onload = e => { const img = document.createElement('img'); img.src = e.target.result; img.className = 'prev-img'; prev.appendChild(img); };
    reader.readAsDataURL(f);
  });
}

async function saveProduct() {
  const title = document.getElementById('pTitle').value.trim();
  const price = document.getElementById('pPrice').value;
  const cat = document.getElementById('pCat').value;
  const stock = document.getElementById('pStock').value;
  const desc = document.getElementById('pDesc').value.trim();
  if (!title || !price) { showToast('❌ 상품명과 가격은 필수입니다.', 'error'); return; }

  setLoading('btnSaveProd', true, '저장 중…');

  // Upload new images
  let imageUrls = editingProduct ? [...(editingProduct.images || [])] : [];
  for (const file of newImageFiles) {
    const ext = file.name.split('.').pop();
    const path = `${myProfile.id}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
    const { error: upErr } = await supabase.storage.from('products').upload(path, file);
    if (!upErr) {
      const { data: urlData } = supabase.storage.from('products').getPublicUrl(path);
      imageUrls.push(urlData.publicUrl);
    }
  }

  const payload = { title, price: Number(price), category: cat, stock: Number(stock), description: desc, images: imageUrls };
  let error;
  if (editingProduct) {
    ({ error } = await supabase.from('products').update(payload).eq('id', editingProduct.id));
  } else {
    ({ error } = await supabase.from('products').insert({ ...payload, seller_id: myProfile.id }));
  }

  setLoading('btnSaveProd', false);
  if (error) { showToast('❌ 오류: ' + error.message, 'error'); return; }
  showToast('✅ 상품이 저장됐습니다!', 'success');
  closeProdModal();
  await loadMyProducts();
  await loadStats();
}

async function toggleStatus(id, current) {
  const next = current === 'active' ? 'hidden' : 'active';
  await supabase.from('products').update({ status: next }).eq('id', id);
  showToast(next === 'active' ? '✅ 상품이 공개됐습니다.' : '🙈 상품이 숨겨졌습니다.');
  await loadMyProducts();
}

async function deleteProduct(id) {
  if (!confirm('정말 삭제하시겠습니까?')) return;
  await supabase.from('products').delete().eq('id', id);
  showToast('🗑️ 상품이 삭제됐습니다.');
  await loadMyProducts(); await loadStats();
}

async function saveProfile() {
  const name = document.getElementById('profName').value.trim();
  const store = document.getElementById('profStore').value.trim();
  const desc = document.getElementById('profDesc').value.trim();
  if (!name) { showToast('❌ 이름을 입력해주세요.', 'error'); return; }

  setLoading('btnSaveProfile', true, '저장 중…');

  let profileImage = myProfile.profile_image;
  const file = document.getElementById('profImg').files[0];
  if (file) {
    const path = `avatars/${myProfile.id}.${file.name.split('.').pop()}`;
    await supabase.storage.from('avatars').upload(path, file, { upsert: true });
    const { data } = supabase.storage.from('avatars').getPublicUrl(path);
    profileImage = data.publicUrl;
  }

  const { error } = await supabase.from('profiles').update({ name, store_name: store, description: desc, profile_image: profileImage }).eq('id', myProfile.id);
  setLoading('btnSaveProfile', false);
  if (error) { showToast('❌ 오류: ' + error.message, 'error'); return; }
  showToast('✅ 프로필이 저장됐습니다!', 'success');
  document.getElementById('sbName').textContent = name;
}

function previewAvatar(input) {
  const file = input.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = e => { document.getElementById('profAvatarPreview').innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;">`; };
    reader.readAsDataURL(file);
  }
}

function closeProdModal() { document.getElementById('prodModal').classList.remove('open'); }

function showPage(pg) {
  ['overview','products','orders','profile'].forEach(p => {
    document.getElementById('page-' + p).style.display = p === pg ? 'block' : 'none';
  });
  document.querySelectorAll('.sb-link').forEach(l => l.classList.remove('active'));
  event.currentTarget.classList.add('active');
}

async function doLogout() { await supabase.auth.signOut(); window.location.href = '../login.html'; }

function statusText(s) { return { pending:'대기중', confirmed:'확인됨', completed:'완료', cancelled:'취소' }[s] || s; }
function statusBadge(s) { return { pending:'bg-yellow', confirmed:'bg-blue', completed:'bg-green', cancelled:'bg-red' }[s] || 'bg-gray'; }

init();
</script>
</body>
</html>
